name: Build Amran Music Player APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Clone Termux-App and Customize
        run: |
          git clone --depth 1 https://github.com/termux/termux-app.git termux_src
          cd termux_src
          
          # ১. অ্যাপের নাম "amp" করা
          find app/src/main/res/ -name "strings.xml" -exec sed -i 's/>Termux</>amp</g' {} +

          # ২. অ্যাপ চালুর সাথে সাথে amp.sh অটো-রান করার জন্য bootstrap ও bashrc সেটআপ
          mkdir -p app/src/main/assets
          curl -sL https://raw.githubusercontent.com/amranwebdev1/amran-music-player/main/amp.sh -o app/src/main/assets/amp.sh
          
          # bashrc ফাইলে amp অটোমেটিক চালুর কোড যুক্ত
          echo "bash /data/data/com.termux/files/home/amp.sh" > app/src/main/assets/bashrc

          # ৩. লোগো রিপ্লেস করা (ic_launcher.png)
          if [ -f "../ic_launcher.png" ]; then
            cp ../ic_launcher.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            cp ../ic_launcher.png app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            cp ../ic_launcher.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
            cp ../ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher.png
            cp ../ic_launcher.png app/src/main/res/mipmap-mdpi/ic_launcher.png
          fi

      - name: Build Debug APK
        run: |
          cd termux_src
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: amp-APK
          path: termux_src/app/build/outputs/apk/debug/*.apk
